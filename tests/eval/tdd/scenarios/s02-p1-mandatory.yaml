# S02: P1 Requirement — Mandatory Full TDD Cycle
# P1 must use full Red-Green-Refactor, no verification log required
- vars:
    input: "Risk level: P1. Change type: requirement. A Plan file exists with 3 Tasks and 4 files. Implementation strategy: direct. What TDD mode should be used?"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'P1';
      metric: risk_level_p1
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.tdd_mode === 'mandatory';
      metric: tdd_mode_mandatory
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.cycle_type === 'red-green-refactor';
      metric: cycle_red_green_refactor
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.skip_allowed === false;
      metric: skip_not_allowed
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.reads_plan_first === true;
      metric: reads_plan_first
