# S05: Bug Fix — Mandatory Reproduction Test
# Bug fixes must write a failing reproduction test first, then fix
- vars:
    input: "Risk level: P1. Change type: bug. Root cause identified by systematic-debugging: OrderBizService.cancel() does not release inventory lock. No Plan file. What TDD mode should be used?"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'Bug' || result.risk_level === 'P1';
      metric: risk_level_bug_or_p1
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.tdd_mode === 'mandatory-reproduction' || result.tdd_mode === 'mandatory';
      metric: tdd_mode_mandatory_reproduction
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.cycle_type === 'red-green-reproduction' || result.cycle_type === 'red-green-refactor';
      metric: cycle_reproduction
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.skip_allowed === false;
      metric: skip_not_allowed
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.reads_plan_first === false;
      metric: no_plan_for_bug
