# S03: P2 — Round 1 Recommended, Manually Skippable
# P2 at least does requirement tracing but can be skipped
- vars:
    input: "Risk level: P2. Implementation complete for a query filter feature on the order list page. Requirement doc is available but no domain knowledge files. What verification strategy should be used?"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'P2';
      metric: risk_level_p2
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const rounds = result.rounds_to_execute || [];
        return rounds.includes(1);
      metric: round_1_included
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.skippable === false;
      metric: not_skippable
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.convergence_target === 'zero-must-fix';
      metric: convergence_zero_must_fix
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.next_step === 'biz-impact-analysis-suggested';
      metric: next_biz_impact_suggested
