# S02: P1 跨域 Planted Defect — 缺失分布式事务回滚机制
# 植入缺陷：库存退还设计为同步本地事务，无法跨域协调，订单取消失败时库存无法回滚
# 期望：has_fatal_flaws=true, fatal_flaw_count>=1, 评审内容提及分布式/回滚/saga
- vars:
    plan_content: |
      # Plan: 订单取消联动库存退还

      ## 计划头
      - **Risk Level**: P1
      - **Domains**: order, inventory
      - **Implementation Strategy**: subagent-driven
      - **Goal**: 实现用户取消已确认订单时，联动退还库存、触发退款、发送取消通知的完整流程
      - **Architecture**: OrderController → OrderCancelService → InventoryService（同域调用）→ RefundMQ（异步）→ NotificationMQ（异步）
      - **Tech Stack**: Java 17, Spring Boot 3, MySQL 8, RocketMQ 5

      ## Task 1: 订单取消状态机更新

      **Files**:
      - Modify: src/main/java/com/example/order/service/OrderCancelService.java
      - Modify: src/main/java/com/example/order/domain/OrderStatus.java
      - Test: src/test/java/com/example/order/service/OrderCancelServiceTest.java

      **Step 1**: 编写失败测试——已确认订单（CONFIRMED）可取消，状态变为 CANCELLED；SHIPPED 状态订单无法取消，抛 OrderNotCancellableException
      **Step 2**: 运行测试，确认失败
      **Step 3**: 实现 OrderCancelService.cancel()：校验订单状态，在事务内将 ORDER 状态更新为 CANCELLING（中间状态），再执行后续步骤
      **Step 4**: 运行测试，确认通过
      **Step 5**: git commit "step 1: 订单取消状态机"

      ## Task 2: MQ 触发退款流程

      **Files**:
      - Create: src/main/java/com/example/order/mq/OrderCancelledProducer.java
      - Test: src/test/java/com/example/order/mq/OrderCancelledProducerTest.java

      **Step 1**: 编写失败测试——已支付订单取消时，发布 ORDER_CANCELLED_FOR_REFUND MQ 消息，消息包含 orderId、paymentId、amount
      **Step 2**: 运行测试，确认失败
      **Step 3**: 实现 MQ 消息发布，在事务提交后异步发送，Payment 域消费该消息触发退款
      **Step 4**: 运行测试，确认通过
      **Step 5**: git commit "step 2: MQ 异步触发退款"

      ## Task 3: 库存退还（同步调用）

      **Files**:
      - Modify: src/main/java/com/example/order/service/OrderCancelService.java
      - Modify: src/main/java/com/example/inventory/service/InventoryService.java
      - Test: src/test/java/com/example/order/service/OrderCancelServiceTest.java

      **Step 1**: 编写失败测试——订单取消时，占用的库存数量退还，inventory_stock 表 reserved_qty 减少对应数量
      **Step 2**: 运行测试，确认失败
      **Step 3**: 在 OrderCancelService 中直接调用 inventoryService.restore(orderId, itemId, qty)，
        将库存退还操作和订单状态更新放在同一个 @Transactional 本地事务中，确保原子性提交
      **Step 4**: 运行测试，确认通过
      **Step 5**: git commit "step 3: 库存退还（本地事务）"

      ## Task 4: 取消通知发送

      **Files**:
      - Create: src/main/java/com/example/order/mq/CancelNotificationProducer.java
      - Test: src/test/java/com/example/order/mq/CancelNotificationProducerTest.java

      **Step 1**: 编写失败测试——取消完成后发送站内信和邮件通知（通过 MQ 异步，不阻塞取消流程）
      **Step 2**: 运行测试，确认失败
      **Step 3**: 实现通知 MQ 发布，Notification 域消费消息后发送站内信和邮件
      **Step 4**: 运行测试，确认通过
      **Step 5**: git commit "step 4: 取消通知（MQ 异步）"

  assert:
    - type: is-json
      value: "{{output}}"

    # ── 核心：planted defect 必须被识别为 fatal flaw ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.has_fatal_flaws === true;
      metric: planted_defect_detected_as_fatal

    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.fatal_flaw_count >= 1;
      metric: at_least_one_fatal_flaw

    # ── 结论不能是 pass ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.conclusion_verdict === 'conditional-pass' || result.conclusion_verdict === 'reject';
      metric: conclusion_is_not_pass

    # ── planted defect 特定：评审内容提及分布式事务/回滚/Saga ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const content = (result.review_content || '').toLowerCase();
        return content.includes('回滚') || content.includes('分布式') ||
               content.includes('saga') || content.includes('rollback') ||
               content.includes('补偿') || content.includes('compensation');
      metric: review_mentions_distributed_coordination

    # ── planted defect 特定：fatal_flaw_topics 包含分布式/回滚相关主题 ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const topics = (result.fatal_flaw_topics || []).join(' ').toLowerCase();
        return topics.includes('回滚') || topics.includes('分布式') ||
               topics.includes('saga') || topics.includes('rollback') ||
               topics.includes('事务') || topics.includes('库存') ||
               topics.includes('inventory') || topics.includes('补偿');
      metric: fatal_flaw_topics_mention_defect

    # ── 结构一致性 ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const hasFatal = result.has_fatal_flaws;
        const count = result.fatal_flaw_count;
        return (hasFatal === false && count === 0) || (hasFatal === true && count > 0);
      metric: fatal_flaw_fields_consistent

    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        if (result.has_fatal_flaws === false) {
          return result.conclusion_verdict === 'pass';
        }
        return result.conclusion_verdict === 'conditional-pass' || result.conclusion_verdict === 'reject';
      metric: verdict_consistent_with_fatal_flaws

    # ── 评审内容完整 ──
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return typeof result.review_content === 'string' && result.review_content.length > 200;
      metric: review_content_not_empty
