# ECW Risk Classifier Behavioral Evaluation
# Verifies routing decisions remain correct after SKILL.md prompt changes.
#
# Usage:
#   npx promptfoo eval                          # Run all scenarios
#   npx promptfoo eval --filter-pattern "p0-*"  # Run P0 scenarios only
#   npx promptfoo eval --repeat 3               # Run each 3x for majority vote
#
# Prerequisites:
#   - ANTHROPIC_API_KEY or compatible API key set in environment
#   - npm install -g promptfoo (or use npx)

description: "ECW Risk Classifier Routing Evaluation"

providers:
  - id: anthropic:messages:pub-claude-opus-4-6
    config:
      temperature: 0
      max_tokens: 2000
      tools:
        - file://tools/classify_result.json
      tool_choice:
        type: any

# The risk-classifier SKILL.md is used as the system prompt
prompts:
  - id: risk-classifier
    raw: |
      [{"role": "system", "content": "{{skill_content}}\n\nIMPORTANT EVAL INSTRUCTION: After your analysis, you MUST call the classify_result tool to report your structured assessment. Include the risk_level, mode, change_type, and the full routing chain as an array of skill names.\n\nValid routing skill names (use ONLY these in the routing array): requirements-elicitation, domain-collab, writing-plans, spec-challenge, tdd, impl-orchestration, impl-verify, biz-impact-analysis, systematic-debugging\n\nCRITICAL routing rules — the routing array must follow these mutual exclusion rules:\n- Cross-domain requirements: use domain-collab, do NOT include requirements-elicitation\n- Single-domain requirements: use requirements-elicitation (P0/P1 only), do NOT include domain-collab\n- Bug fixes: use systematic-debugging + impl-verify, do NOT include requirements-elicitation, domain-collab, writing-plans, or spec-challenge. P0/P1 bugs MUST also include biz-impact-analysis\n- Fast-track: use impl-verify + biz-impact-analysis, do NOT include requirements-elicitation, spec-challenge, or domain-collab\n- P0 (any mode): MUST include spec-challenge\n- P1 cross-domain: MUST include spec-challenge\n- P1 single-domain: do NOT include spec-challenge\n- P2 single-domain: skip requirements-elicitation and spec-challenge\n- P3: minimal routing, skip writing-plans, requirements-elicitation, spec-challenge\n- P0/P1 requirements (any mode): MUST include biz-impact-analysis\n- P2 requirements: do NOT include biz-impact-analysis\n- P0-P2 requirements (any mode): MUST include tdd\n- P3 requirements: do NOT include tdd\n- Bugs (any risk level): do NOT include tdd\n- Fast-track: do NOT include tdd\n\nHere is the project context for domain matching:\n- Available domains: order, payment, inventory, logistics, user\n- Domain routing keywords:\n  - order: 订单, 下单, 退款, order\n  - payment: 支付, 收款, PCI, payment, 网关\n  - inventory: 库存, 扣减, inventory, 仓储\n  - logistics: 物流, 配送, 发货, logistics\n  - user: 用户, 注册, 登录, user, 手机号\n- Sensitive words (→ at least P1): PCI, 支付网关, 状态机, 库存扣减, 资金"},{"role": "user", "content": "{{input}}"}]

# Load scenarios from YAML files
tests: file://scenarios/*.yaml

# Variables injected into prompts
vars:
  skill_content:
    type: file
    path: ../../skills/risk-classifier/SKILL.md
