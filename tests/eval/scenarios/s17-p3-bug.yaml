# S17: P3 Bug (Low-Risk)
# P3 bug should route to systematic-debugging + impl-verify
# Minimal workflow, no biz-impact-analysis, no writing-plans
- vars:
    input: "后台管理页面的导出按钮点击后 CSV 文件名日期格式不对，显示为 yyyyMMdd 应该是 yyyy-MM-dd"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.change_type === 'bug';
      metric: change_type_bug
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'P3';
      metric: risk_level_p3
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('systematic-debugging');
      metric: routing_includes_systematic_debugging
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P3 bugs must NOT include biz-impact-analysis
        return !routing.includes('biz-impact-analysis');
      metric: routing_excludes_biz_impact_analysis
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('requirements-elicitation');
      metric: routing_excludes_requirements_elicitation
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('domain-collab');
      metric: routing_excludes_domain_collab
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('writing-plans');
      metric: routing_excludes_writing_plans
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('spec-challenge');
      metric: routing_excludes_spec_challenge
