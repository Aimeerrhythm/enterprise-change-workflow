# S18: P0 Cross-Domain Dense Scenario (WMS-like)
# Reproduces the analysis report's reference session: P0, 4 domains, state machine changes.
# This is the exact pattern that caused 6 context compressions in a single session.
# Tests the full heavy pipeline routing including tdd.
- vars:
    input: "入库签收时如果实际到货数量与订单数量不符，需要在库存域冻结该批次库存扣减操作、物流域通知拦截退货、订单域更新订单状态机为异常状态并关联异常单、用户域发送到货异常推送通知"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'P0';
      metric: risk_level_p0
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.mode === 'cross-domain';
      metric: mode_cross_domain
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const domains = result.domains || [];
        // Must detect at least 3 of: order, inventory, logistics, user
        const expected = ['order', 'inventory', 'logistics', 'user'];
        const matched = expected.filter(d => domains.includes(d));
        return matched.length >= 3;
      metric: domains_at_least_3
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('domain-collab');
      metric: routing_includes_domain_collab
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('requirements-elicitation');
      metric: routing_excludes_requirements_elicitation
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('writing-plans');
      metric: routing_includes_writing_plans
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P0 must include spec-challenge
        return routing.includes('spec-challenge');
      metric: routing_includes_spec_challenge
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P0 requirement must include tdd (context compression: tdd routing)
        return routing.includes('tdd');
      metric: routing_includes_tdd
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P0 requirement must include biz-impact-analysis
        return routing.includes('biz-impact-analysis');
      metric: routing_includes_biz_impact_analysis
