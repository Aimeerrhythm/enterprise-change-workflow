# S21: Bug Excludes TDD
# Bug fix routing must NOT include tdd — bugs go through systematic-debugging.
# This is the negative complement to s18-s20 which test tdd inclusion.
- vars:
    input: "用户反馈修改收货地址后物流信息未更新，快递仍发往旧地址"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.change_type === 'bug';
      metric: change_type_bug
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        // Bug about address not syncing — P1 to P3 range is acceptable
        return result.risk_level !== 'P0';
      metric: risk_level_not_p0
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('systematic-debugging');
      metric: routing_includes_systematic_debugging
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Bugs must NOT include tdd (context compression: tdd exclusion)
        return !routing.includes('tdd');
      metric: routing_excludes_tdd
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Bugs must NOT include writing-plans
        return !routing.includes('writing-plans');
      metric: routing_excludes_writing_plans
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('spec-challenge');
      metric: routing_excludes_spec_challenge
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('domain-collab');
      metric: routing_excludes_domain_collab
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('requirements-elicitation');
      metric: routing_excludes_requirements_elicitation
