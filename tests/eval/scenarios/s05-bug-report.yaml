# S5: Bug Report
# Bug should route to systematic-debugging, NOT requirements-elicitation
# Input contains sensitive keyword "库存扣减" → should be at least P1
- vars:
    input: "线上用户反馈下单后库存没有扣减，导致超卖"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.change_type === 'bug';
      metric: change_type_bug
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        // "库存扣减" is a sensitive keyword → at least P1
        return result.risk_level === 'P0' || result.risk_level === 'P1';
      metric: risk_level_p0_or_p1
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('systematic-debugging');
      metric: routing_includes_systematic_debugging
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('requirements-elicitation');
      metric: routing_excludes_requirements_elicitation
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return !routing.includes('domain-collab');
      metric: routing_excludes_domain_collab
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Bug fix routing does not use spec-challenge or writing-plans
        return !routing.includes('spec-challenge');
      metric: routing_excludes_spec_challenge
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P0/P1 bugs must include biz-impact-analysis
        return routing.includes('biz-impact-analysis');
      metric: routing_includes_biz_impact_analysis
