# S20: P2 Single-Domain Requirement with TDD
# P2 requirement should include tdd but NOT spec-challenge or biz-impact-analysis.
# Tests the "lighter but still TDD-required" pipeline.
- vars:
    input: "订单列表页需要支持按下单时间范围筛选，提升大数据量下的查询效率"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.risk_level === 'P2';
      metric: risk_level_p2
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.mode === 'single-domain';
      metric: mode_single_domain
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        return result.change_type === 'requirement';
      metric: change_type_requirement
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('writing-plans');
      metric: routing_includes_writing_plans
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P2 requirement must include tdd (context compression: tdd routing)
        return routing.includes('tdd');
      metric: routing_includes_tdd
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P2 must NOT include spec-challenge
        return !routing.includes('spec-challenge');
      metric: routing_excludes_spec_challenge
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P2 must NOT include biz-impact-analysis
        return !routing.includes('biz-impact-analysis');
      metric: routing_excludes_biz_impact_analysis
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P2 single-domain: no requirements-elicitation
        return !routing.includes('requirements-elicitation');
      metric: routing_excludes_requirements_elicitation
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Single-domain: no domain-collab
        return !routing.includes('domain-collab');
      metric: routing_excludes_domain_collab
