# S24: Bug with Sensitive Keyword
# Bug report contains sensitive terms (payment/金额) but change_type must stay "bug".
# Tests that sensitive keywords elevate risk_level, NOT override change_type to requirement.
- vars:
    input: "线上用户反馈：使用优惠券后支付金额计算错误，实际扣款比展示金额多了0.01元，已有3个客诉工单"
  assert:
    - type: is-json
      value: "{{output}}"
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        // Must remain bug despite sensitive keywords
        return result.change_type === 'bug';
      metric: change_type_bug
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        // Payment bug with customer complaints → high risk (P0 or P1)
        return result.risk_level === 'P0' || result.risk_level === 'P1';
      metric: risk_level_high
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Bug must route to systematic-debugging
        return routing.includes('systematic-debugging');
      metric: routing_includes_systematic_debugging
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // Bug must NOT include requirement-only skills
        return !routing.includes('requirements-elicitation') &&
               !routing.includes('writing-plans') &&
               !routing.includes('spec-challenge');
      metric: routing_excludes_requirement_skills
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        return routing.includes('impl-verify');
      metric: routing_includes_impl_verify
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const result = parsed.input || parsed;
        const routing = result.routing || [];
        // P0/P1 bug must include biz-impact-analysis
        return routing.includes('biz-impact-analysis');
      metric: routing_includes_biz_impact_analysis
