# ECW Workflow Traces — Golden Fixture
#
# Defines the expected complete workflow trace for each {risk_level, domain_scope, change_type}
# routing combination. Cross-validated against workflow-routes.yml and data_contracts.yaml
# by test_workflow_simulator.py.
#
# Fields:
#   skill_chain:       ordered list of skills invoked
#   checkpoint_writes: list of {skill, key} checkpoint files produced
#   ask_user_skills:   skills that invoke AskUserQuestion during the trace

traces:

  # ── Requirement Changes — Single Domain ──

  - name: "P0 single-domain requirement"
    input: {risk_level: P0, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - requirements-elicitation
        - writing-plans
        - spec-challenge
        - tdd
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: requirements-elicitation, key: requirements-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: spec-challenge, key: spec-challenge-report}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, requirements-elicitation, writing-plans, spec-challenge, tdd]

  - name: "P1 single-domain requirement"
    input: {risk_level: P1, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - requirements-elicitation
        - writing-plans
        - tdd
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: requirements-elicitation, key: requirements-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, requirements-elicitation, writing-plans, tdd]

  - name: "P2 single-domain requirement"
    input: {risk_level: P2, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - writing-plans
        - tdd
        - impl-verify
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: writing-plans, key: plan-file}
        - {skill: impl-verify, key: impl-verify-findings}
      ask_user_skills: [risk-classifier, writing-plans, tdd]

  - name: "P3 single-domain requirement"
    input: {risk_level: P3, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
      ask_user_skills: [risk-classifier]

  # ── Requirement Changes — Cross-Domain ──

  - name: "P0 cross-domain requirement"
    input: {risk_level: P0, domain_scope: cross-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - domain-collab
        - writing-plans
        - spec-challenge
        - tdd
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: domain-collab, key: domain-collab-report}
        - {skill: domain-collab, key: knowledge-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: spec-challenge, key: spec-challenge-report}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, writing-plans, spec-challenge, tdd]

  - name: "P1 cross-domain requirement"
    input: {risk_level: P1, domain_scope: cross-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - domain-collab
        - writing-plans
        - tdd
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: domain-collab, key: domain-collab-report}
        - {skill: domain-collab, key: knowledge-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, writing-plans, tdd]

  - name: "P2 cross-domain requirement"
    input: {risk_level: P2, domain_scope: cross-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - domain-collab
        - writing-plans
        - tdd
        - impl-verify
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: domain-collab, key: domain-collab-report}
        - {skill: domain-collab, key: knowledge-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: impl-verify, key: impl-verify-findings}
      ask_user_skills: [risk-classifier, writing-plans, tdd]

  - name: "P3 cross-domain requirement"
    input: {risk_level: P3, domain_scope: cross-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - domain-collab
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: domain-collab, key: domain-collab-report}
        - {skill: domain-collab, key: knowledge-summary}
      ask_user_skills: [risk-classifier]

  # ── Bug Fix Changes ──
  # Entry point: ecw:systematic-debugging (no risk-classifier).
  # Fixed chain: systematic-debugging → tdd → impl-verify

  - name: "bug fix"
    input: {risk_level: any, domain_scope: any, change_type: bug}
    expected:
      skill_chain:
        - systematic-debugging
        - tdd
        - impl-verify
      checkpoint_writes:
        - {skill: systematic-debugging, key: session-state}
        - {skill: systematic-debugging, key: debug-evidence}
        - {skill: impl-verify, key: impl-verify-findings}
      ask_user_skills: [systematic-debugging, tdd]



  # ── Implementation Strategy: subagent-driven (impl-orchestration replaces tdd) ──
  # Triggered when Plan has tasks 4-8 + P0/P1, or tasks > 8, or files >= 6.
  # Same routing chain as tdd variant but tdd replaced by impl-orchestration.
  # must_include/must_exclude from workflow-routes.yml are still satisfied.

  - name: "P0 single-domain requirement (impl-orchestration)"
    input: {risk_level: P0, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - requirements-elicitation
        - writing-plans
        - spec-challenge
        - impl-orchestration
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: requirements-elicitation, key: requirements-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: spec-challenge, key: spec-challenge-report}
        - {skill: impl-orchestration, key: session-state}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, requirements-elicitation, writing-plans, spec-challenge, impl-orchestration]

  - name: "P1 single-domain requirement (impl-orchestration)"
    input: {risk_level: P1, domain_scope: single-domain, change_type: requirement}
    expected:
      skill_chain:
        - risk-classifier
        - requirements-elicitation
        - writing-plans
        - impl-orchestration
        - impl-verify
        - biz-impact-analysis
        - knowledge-track
      checkpoint_writes:
        - {skill: risk-classifier, key: session-state}
        - {skill: requirements-elicitation, key: requirements-summary}
        - {skill: writing-plans, key: plan-file}
        - {skill: impl-orchestration, key: session-state}
        - {skill: impl-verify, key: impl-verify-findings}
        - {skill: knowledge-track, key: doc-tracker}
      ask_user_skills: [risk-classifier, requirements-elicitation, writing-plans, impl-orchestration]
