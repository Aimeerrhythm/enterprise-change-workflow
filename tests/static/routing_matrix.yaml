  must_exclude:
    - requirements-elicitation
    - spec-challenge

- level: P3
  mode: cross-domain
  type: requirement
  must_include:
    - domain-collab
  must_exclude:
    - requirements-elicitation
    - writing-plans
    - spec-challenge

