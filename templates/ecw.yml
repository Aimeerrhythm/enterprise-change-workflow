# Enterprise Change Workflow Configuration
# 本文件定义项目的 ECW 配置。由 /ecw-init 生成，可手动编辑。

project:
  name: "Your Project Name"          # 项目名称，用于 agent prompt 中的上下文
  type: "java-monolith"              # java-monolith | java-microservice | go-monolith | node | python
  language: "java"                   # java | go | typescript | python

# 组件类型定义
# 域分析中识别的变更组件分类。每种类型定义 grep 验证模式。
# {name} 占位符在运行时替换为实际类名/文件名。
component_types:
  - name: Service                    # 组件类型名称
    grep_pattern: "class {name}"     # 代码验证 grep 模式，{name} 替换为实际类名
    search_path: "."                 # grep 搜索路径
  # === Java/Spring 示例 ===
  # - name: BizService
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/"
  # - name: Manager
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/"
  # - name: DO
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/**/domain/"
  # - name: Controller
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/**/interfaces/"
  # - name: Mapper
  #   grep_pattern: "interface {name}"
  #   search_path: "src/main/java/**/mapper/"
  # === Go 示例 ===
  # - name: Handler
  #   grep_pattern: "func.*{name}"
  #   search_path: "internal/handler/"
  # - name: Repository
  #   grep_pattern: "type {name} struct"
  #   search_path: "internal/repo/"
  # === Node/TypeScript 示例 ===
  # - name: Service
  #   grep_pattern: "class {name}"
  #   search_path: "src/services/"
  # - name: Controller
  #   grep_pattern: "class {name}"
  #   search_path: "src/controllers/"

# 代码扫描模式（biz-impact-analyzer 使用）
# 定义如何在 diff 中检测跨域依赖和外部集成。
# 每个 key 是语义类别，value 是在代码中 grep 的标识字符串。
scan_patterns:
  # -- 依赖注入 --
  cross_domain_injection: "@Resource"          # 跨域类注入标记
  # Go: "wire.Bind" | Node: "constructor(private" | Python: "@inject"

  # -- 外部服务引用 --
  external_reference: "@DubboReference"        # 外部服务引用标记（RPC 框架）
  # Go: "grpc.Dial" | Node: "axios.create" | Python: "httpx.Client"

  # -- MQ 消息发送 --
  mq_send: "mqMsgManager"                     # MQ 发送标识
  # Go: "kafka.NewWriter" | Node: "amqpChannel.publish" | Python: "producer.send"

  # -- 事件发布 --
  event_publish: "applicationEventPublisher"   # 事件发布标识
  # Go: "eventBus.Publish" | Node: "eventEmitter.emit" | Python: "event_bus.publish"

  # -- 配置驱动逻辑 --
  config_driven: "@NacosValue"                 # 配置驱动逻辑标识
  # Go: "viper.Get" | Node: "config.get" | Python: "settings."

  # 自定义模式：根据项目需要添加更多扫描模式
  # db_write: "INSERT|UPDATE|DELETE"           # SQL 写操作
  # cache_op: "redisTemplate"                  # 缓存操作
  # scheduled: "@Scheduled"                    # 定时任务

# 路径配置
# 通常使用默认值即可。仅当项目 .claude 目录结构不同时才需修改。
paths:
  domain_registry: ".claude/ecw/domain-registry.md"            # 域注册表
  risk_factors: ".claude/ecw/change-risk-classification.md"    # 风险分级规则
  path_mappings: ".claude/ecw/ecw-path-mappings.md"            # 代码路径→域映射
  knowledge_root: ".claude/knowledge/"                         # 知识库根目录
  knowledge_common: ".claude/knowledge/common/"                # 跨域公共知识
