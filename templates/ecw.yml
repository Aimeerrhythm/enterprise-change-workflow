# Enterprise Change Workflow Configuration
# 本文件定义项目的 ECW 配置。由 /ecw-init 生成，可手动编辑。

project:
  name: "Your Project Name"          # 项目名称，用于 agent prompt 中的上下文
  type: "java-monolith"              # java-monolith | java-microservice | go-monolith | node | python
  language: "java"                   # java | go | typescript | python

# 组件类型定义
# 域分析中识别的变更组件分类。每种类型定义 grep 验证模式。
# {name} 占位符在运行时替换为实际类名/文件名。
component_types:
  - name: Service                    # 组件类型名称
    grep_pattern: "class {name}"     # 代码验证 grep 模式，{name} 替换为实际类名
    search_path: "."                 # grep 搜索路径
  # === Java/Spring 示例 ===
  # - name: BizService
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/"
  # - name: Manager
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/"
  # - name: DO
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/**/domain/"
  # - name: Controller
  #   grep_pattern: "class {name}"
  #   search_path: "src/main/java/**/interfaces/"
  # - name: Mapper
  #   grep_pattern: "interface {name}"
  #   search_path: "src/main/java/**/mapper/"
  # === Go 示例 ===
  # - name: Handler
  #   grep_pattern: "func.*{name}"
  #   search_path: "internal/handler/"
  # - name: Repository
  #   grep_pattern: "type {name} struct"
  #   search_path: "internal/repo/"
  # === Node/TypeScript 示例 ===
  # - name: Service
  #   grep_pattern: "class {name}"
  #   search_path: "src/services/"
  # - name: Controller
  #   grep_pattern: "class {name}"
  #   search_path: "src/controllers/"

# 代码扫描模式（biz-impact-analysis 使用）
# 定义如何在 diff 中检测跨域依赖和外部集成。
# 每个 key 是语义类别，value 是在代码中 grep 的标识字符串。
scan_patterns:
  # 每个 value 支持多个模式，用 | 分隔（作为 grep -E 的正则交替匹配）
  # 示例: "@Resource|@Autowired|@Inject" 会匹配任意一种注入注解

  # -- 依赖注入 --
  # 检测跨域类注入。命中说明当前域直接依赖了其他域的服务，修改可能影响调用方/被调用方。
  cross_domain_injection: "@Resource|@Autowired|@Inject"
  # Go: "wire.Bind|wire.Struct" | Node: "constructor(private" | Python: "@inject"

  # -- 外部服务引用 --
  # 检测 RPC/远程服务调用。命中说明依赖外部系统，修改可能影响接口契约、超时、降级策略。
  external_reference: "@DubboReference"
  # Go: "grpc.Dial|grpc.NewClient" | Node: "axios.create|fetch(" | Python: "httpx.Client|requests.Session"

  # -- MQ 消息发送 --
  # 检测消息队列发送。命中说明存在异步下游消费者，修改消息体/Topic 会影响所有订阅方。
  mq_send: "mqMsgManager"
  # Go: "kafka.NewWriter|sarama.NewSyncProducer" | Node: "amqpChannel.publish" | Python: "producer.send"

  # -- 事件发布 --
  # 检测应用内事件发布。命中说明有事件监听者依赖此事件，修改事件结构会影响所有 @EventListener。
  event_publish: "applicationEventPublisher"
  # Go: "eventBus.Publish" | Node: "eventEmitter.emit" | Python: "event_bus.publish"

  # -- 配置驱动逻辑 --
  # 检测运行时配置读取。命中说明逻辑受配置中心控制，修改配置 key 或默认值可能改变线上行为。
  config_driven: "@NacosValue|@Value"
  # Go: "viper.Get|viper.GetString" | Node: "config.get|process.env" | Python: "settings.|os.environ"

  # 自定义模式：根据项目需要添加
  # db_write: "INSERT|UPDATE|DELETE"             # SQL 写操作。命中说明直接修改数据，需关注事务边界和数据一致性。
  # cache_op: "redisTemplate|RedissonClient"     # 缓存操作。命中说明涉及缓存读写，需关注缓存一致性和过期策略。
  # scheduled: "@Scheduled|@XxlJob"              # 定时任务。命中说明是定时触发逻辑，修改可能影响执行频率和业务时序。

# 完成验证配置
# verify-completion hook 的行为控制。
verification:
  # 改了 .java 文件时是否执行 mvn test（失败则阻止标记完成）。
  # 默认 true。大型项目测试耗时长时可设为 false 仅做编译检查。
  run_tests: true
  # mvn test 超时秒数。超时不阻止完成，仅输出警告。
  test_timeout: 300

# TDD 流程配置
# 控制测试先行流程的行为。与 risk-classifier 路由联动。
tdd:
  # 是否启用 TDD 流程。
  # true：P0-P2 强制在实现前写失败测试，P3 推荐。
  # false：TDD 阶段降级为推荐（不强制），用户可自行决定。
  enabled: true
  # verify-completion hook 中检查新增/修改的 BizService/Manager 是否有对应测试文件。
  # 默认 false。设为 true 后，缺少测试文件时输出非阻塞提醒。
  check_test_files: false
  # 测试基类（供参考，不影响逻辑）。
  # Java: "BaseUnitTest" | Go: "TestSuite" | Node: 留空
  # base_test_class: "BaseUnitTest"

# 路径配置
# 通常使用默认值即可。仅当项目 .claude 目录结构不同时才需修改。
paths:
  domain_registry: ".claude/ecw/domain-registry.md"            # 域注册表
  risk_factors: ".claude/ecw/change-risk-classification.md"    # 风险分级规则
  path_mappings: ".claude/ecw/ecw-path-mappings.md"            # 代码路径→域映射
  knowledge_root: ".claude/knowledge/"                         # 知识库根目录
  knowledge_common: ".claude/knowledge/common/"                # 跨域公共知识
  calibration_log: ".claude/ecw/calibration-log.md"            # Phase 3 校准历史
  calibration_history: ".claude/ecw/state/calibration-history.md"  # Phase 3 校准记录（Phase 1 参考）
