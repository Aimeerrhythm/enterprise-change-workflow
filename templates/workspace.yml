# Workspace Configuration Template
#
# Generated by: /ecw:workspace create
# Location: {workspace}/.claude/ecw/workspace.yml

workspace:
  name: "{WORKSPACE_NAME}"
  created: "{CREATED_TIMESTAMP}"
  description: "{REQUIREMENT_DESCRIPTION}"

services:
  # Repeat this block for each service in the workspace
  - id: "{SERVICE_ID}"
    source: "{ABSOLUTE_PATH_TO_ORIGINAL_REPO}"
    branch: "ws/{WORKSPACE_NAME}"
    base_branch: "{master|main|develop}"

build:
  # Maven action when Provider service completes (API Jar publishing)
  # install: local .m2 only (default, safe for local dev)
  # deploy: push to remote Maven repo (needed for K8s environment testing)
  maven_action: install

terminal:
  # Terminal adapter for multi-session split pane automation
  # auto: detect terminal type, fallback to manual
  # ghostty: macOS AppleScript + clipboard paste
  # iterm2: macOS AppleScript native
  # tmux: cross-platform tmux split-window
  # manual: just print commands for user to run
  adapter: auto
