[tool.ruff]
target-version = "py38"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",  # line length handled by formatter
    "SIM108", # ternary operator — readability preference
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["N802", "N803"]  # allow non-PEP8 names in test files

[tool.ruff.format]
quote-style = "double"
